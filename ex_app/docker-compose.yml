services:
  db:
    image: postgres:15.2
    restart: always
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_net
  app:
    image: ex_app:1.0
    environment:
      - DATABASE_URL=ecto://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
      - PHX_HOST=localhost
      - PHX_SERVER=true
    ports:
      - "4000:4000"
    depends_on:
      - db
    networks:
      - app_net

networks:
  app_net:
