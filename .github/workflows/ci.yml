name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ex_app

    services:
      db:
        image: postgres:15.2
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      MIX_ENV: test
      DATABASE_URL: ecto://postgres:postgres@db/app_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup BEAM
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17.3"
          otp-version: "27"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-deps-${{ hashFiles('ex_app/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-deps-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile dependencies
        run: mix deps.compile

      - name: Checking retired dependencies
        run: mix hex.audit

      - name: Finding unused dependencies
        run: mix deps.unlock --check-unused

      - name: Format check
        run: mix format --check-formatted

      - name: Compile
        run: mix compile --all-warnings --warnings-as-errors

      - name: Verify db migrations
        run: mix ecto.create && mix ecto.migrate && mix ecto.rollback --all

      - name: Run tests with JUnit
        run: mix test

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: _build/test/lib/*.xml
